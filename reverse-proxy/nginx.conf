# Nginx High-Performance Config for Corporate Card Booking
# Modernized for "Senior Dev" standards (v1.1)

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # [Character Encoding] Critical for Thai Mojibake prevention
    charset utf-8;
    source_charset utf-8;

    # [Network Performance]
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # [Upload Limits] Allow large PDF/Receipt uploads (50MB)
    client_max_body_size 50M;

    # [Gzip Acceleration] Redundant for LCP/FCP optimization
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types 
        text/plain 
        text/css 
        application/json 
        application/javascript 
        text/xml 
        application/xml 
        application/xml+rss 
        text/javascript 
        image/svg+xml;

    # [Upstream Registry] Next.js Node server
    upstream nextjs_upstream {
        server app:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # [Security Headers] Production Hardening
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data:;" always;
        # Strictly for production HTTPS (HSTS)
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Main Application Proxy
        location / {
            proxy_pass http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Real-client IP forwarding
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Resilience timeouts for heavy generation tasks
            proxy_read_timeout 90;
            proxy_connect_timeout 90;
            proxy_send_timeout 90;
        }
        
        # [Performance Cache] Next.js Static Build Assets
        # Max-age 365d since these are hashed by Next.js
        location /_next/static {
            proxy_pass http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 365d;
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # [Performance Cache] Public Directory Static Assets
        location /static {
            proxy_pass http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 30d;
            access_log off;
            add_header Cache-Control "public, max-age=2592000";
        }

        # [Health Management] Internal monitoring
        location /api/health {
            proxy_pass http://nextjs_upstream/api/health;
            access_log off;
            return 200 '{"status":"up"}';
        }
    }
}
