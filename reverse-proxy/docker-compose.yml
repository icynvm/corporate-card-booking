version: "3.8"

services:
  # Next.js Application
  app:
    build:
      context: ../
      dockerfile: Dockerfile  # Assuming you have a Dockerfile in the root
    restart: always
    environment:
      - NODE_ENV=production
      # Environment variables (Add your .env variables here)
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    networks:
      - app-network

  # Nginx Reverse Proxy
  proxy:
    image: nginx:stable-alpine
    container_name: nextjs_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
